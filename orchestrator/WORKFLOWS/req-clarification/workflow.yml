workflow:
  name: req-clarification
  description: 需求澄清流程 - 将模糊不明确的需求通过结构化访谈转化为单一 Feature 的需求规格文档，对接后续 feature-implementation 流程
  version: 2.1.0
  type: analysis

  # 设计原则
  # - 一次需求澄清 = 一个 Program = 一份 requirement-spec.md = 一个 Feature
  # - 复杂性通过增加步骤数量解决，不拆分为多个 Feature 或多个 Program
  # - 输出的 requirement-spec.md 直接作为 feature-implementation 的唯一输入

  # 六阶段生命周期
  lifecycle:
    research:
      enabled: true
      description: 加载原始需求和架构上下文，识别模糊点
      steps:
        - id: load_raw_requirement
          name: 加载原始需求
          action: load_feature
          inputs: [raw_requirement]
          outputs: [raw_requirement_context]
          spec: steps/research/01-load-raw-requirement.md

        - id: load_architecture
          name: 加载架构上下文
          action: load_rules
          inputs: [architecture_rules]
          outputs: [architecture_constraints]
          spec: steps/research/02-load-architecture.md

        - id: analyze_ambiguity
          name: 分析需求模糊点
          action: analyze_context
          inputs: [raw_requirement_context, architecture_constraints]
          outputs: [requirement_analysis]
          spec: steps/research/03-analyze-ambiguity.md

    decision:
      enabled: true
      description: 通过结构化访谈逐步澄清需求，核心交互阶段
      steps:
        - id: clarify_business_goal
          name: 澄清业务目标
          action: clarify_business_goal
          inputs: [requirement_analysis]
          outputs: [business_goal_answers]
          require_confirmation: true
          spec: steps/decision/01-clarify-business-goal.md

        - id: clarify_functional_scope
          name: 澄清功能范围
          action: clarify_functional_scope
          inputs: [requirement_analysis, business_goal_answers]
          outputs: [functional_scope_answers]
          require_confirmation: true
          spec: steps/decision/02-clarify-functional-scope.md

        - id: clarify_data_requirements
          name: 澄清数据需求
          action: clarify_data_requirements
          inputs: [requirement_analysis, functional_scope_answers]
          outputs: [data_requirements_answers]
          require_confirmation: true
          spec: steps/decision/03-clarify-data-requirements.md

        - id: clarify_business_rules
          name: 澄清业务规则
          action: clarify_business_rules
          inputs: [functional_scope_answers, data_requirements_answers]
          outputs: [business_rules_answers]
          require_confirmation: true
          spec: steps/decision/04-clarify-business-rules.md

        - id: confirm_clarification
          name: 确认澄清完成
          action: confirm
          inputs: [business_goal_answers, functional_scope_answers, data_requirements_answers, business_rules_answers]
          outputs: [clarification_confirmed]
          require_confirmation: true
          spec: steps/decision/05-confirm-clarification.md

    plan:
      enabled: true
      description: 基于澄清结果生成单一 Feature 的需求规格文档
      steps:
        - id: generate_requirement_spec
          name: 生成需求文档
          action: generate_spec
          inputs: [clarification_confirmed, business_goal_answers, functional_scope_answers, data_requirements_answers, business_rules_answers, architecture_constraints]
          outputs: [requirement_spec]
          spec: steps/plan/01-generate-requirement-spec.md

        - id: confirm_requirement_spec
          name: 确认需求文档
          action: confirm
          inputs: [requirement_spec]
          outputs: [requirement_spec_confirmed]
          require_confirmation: true
          source_of_truth: true
          spec: steps/plan/02-confirm-requirement-spec.md

    execute:
      enabled: true
      description: 验证需求文档完整性，确保可直接用于 feature-implementation
      steps:
        - id: validate_completeness
          name: 验证需求文档完整性
          action: validate_completeness
          inputs: [requirement_spec_confirmed]
          outputs: [completeness_check]
          spec: steps/execute/01-validate-completeness.md

    feedback:
      enabled: true
      description: 整体反馈与最终调整
      steps:
        - id: collect_feedback
          name: 整体反馈与调整
          action: confirm
          inputs: [requirement_spec_confirmed, completeness_check]
          outputs: [feedback_result]
          spec: steps/feedback/01-collect-feedback.md

    review:
      enabled: true
      description: 最终确认，输出进入 feature-implementation 的指引
      steps:
        - id: validate_coverage
          name: 验证需求覆盖度
          action: validate_completeness
          inputs: [requirement_spec_confirmed, feedback_result]
          outputs: [coverage_check]
          spec: steps/review/01-validate-coverage.md

        - id: output_final_plan
          name: 输出最终方案
          action: confirm
          inputs: [requirement_spec_confirmed, coverage_check]
          outputs: [final_plan_confirmed]
          require_confirmation: true
          spec: steps/review/02-output-final-plan.md

  # 输入定义
  inputs:
    - name: raw_requirement
      type: string
      required: true
      description: |
        原始需求描述，接受任意形式的模糊输入：
        - 一段描述性文字（"我想做一个 XXX 功能"）
        - 草稿文档
        - 口述记录
        - 功能关键词列表

    - name: architecture_rules
      type: rule
      required: true
      description: 服务分层架构规则
      path: .qoder/rules/req-decomposition/
      pattern: "02-service-layering.md"
      auto_load: true

    - name: context
      type: string
      required: false
      description: 额外上下文（业务背景、团队约束、技术限制等）

  # 输出定义
  outputs:
    - name: requirement_spec
      type: file
      description: 单一 Feature 的需求规格文档（唯一可信源，直接作为 feature-implementation 输入）
      path: workspace/outputs/requirement-spec.md
      format: markdown

  # 可信源定义
  source_of_truth:
    name: requirement_spec
    type: markdown
    location: workspace/outputs/requirement-spec.md
    description: |
      澄清结果的唯一可信源。
      描述一个完整的 Feature，直接作为 feature-implementation 流程的输入。
      若 Feature 较复杂，通过增加步骤来实现，而不是拆分为多个 Feature。

  # 约束
  constraints:
    one_program_per_requirement: true         # 一次需求澄清 = 一个 Program
    one_feature_per_clarification: true       # 一次澄清 = 一个 Feature，不拆分
    handle_complexity_by_steps: true          # 复杂需求通过增加实现步骤解决
    require_user_confirmation_each_step: true # 每个澄清步骤需用户确认
    output_compatible_with_feature_implementation: true  # 输出必须兼容 feature-implementation

  # 与下游流程对接
  downstream_workflows:
    - name: feature-implementation
      trigger: req-clarification 完成后触发
      how_to_trigger: |
        需求澄清完成后，直接启动实现：
        "继续 feature-implementation，需求文档：workspace/outputs/requirement-spec.md"
      input_mapping:
        requirement_spec: "workspace/outputs/requirement-spec.md"

  # 元数据
  metadata:
    author: workflow-designer
    created: "2026-03-19"
    updated: "2026-03-20"
    version_notes: "v2.1 - 聚焦单一 Feature，去掉 Feature 拆分步骤，通过增加步骤处理复杂性"
    tags: [requirement, clarification, analysis, single-feature]
    downstream_workflow: feature-implementation
