program:
  id: P-2026-001-F-012
  name: F-012 AI对话引擎

write_scope:
  directories:
    - path: workspace/
      description: Program工作目录
    - path: workspace/inputs/
      description: 输入文档
    - path: workspace/outputs/
      description: 输出产物
    - path: workspace/outputs/generated/
      description: 生成的代码

  files:
    - path: PROGRAM.md
      description: Program定义
    - path: STATUS.yml
      description: 状态跟踪
    - path: SCOPE.yml
      description: 写入范围定义
    - path: workspace/outputs/tech-spec.md
      description: 技术规格书（可信源）
    - path: workspace/outputs/implementation-report.md
      description: 实现报告
    - path: workspace/outputs/quality-report.md
      description: 质量报告

read_scope:
  files:
    - path: ../P-2026-001-ai-agent-decomposition/workspace/decomposition.md
      description: 需求拆分报告（Feature定义参考源）
    - path: ../../inputs/products/ai-agent-platform-prd.md
      description: 产品需求文档

  external_refs:
    - program: P-2026-001-F-006
      description: 智能员工申请与审核（依赖）
    - program: P-2026-001-F-009
      description: Prompt管理与生成（依赖）
    - program: P-2026-001-F-010
      description: 话术管理与审核（依赖）
    - program: P-2026-001-F-011
      description: 知识库管理与审核（依赖）
    - program: P-2026-001-F-013
      description: 对话记录与内容审核（依赖）

constraints:
  - 所有代码生成必须基于tech-spec.md
  - 数据库脚本输出到outputs/data/sql/
  - HTTP测试文件输出到outputs/data/http/
