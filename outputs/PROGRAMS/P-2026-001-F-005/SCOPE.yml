# 写入范围定义

scope:
  repos:
    - name: mall-admin
      path: outputs/code/repos/mall-admin
      layers: [facade]
      write: true
    - name: mall-agent-employee-service
      path: outputs/code/repos/mall-agent-employee-service
      layers: [application]
      write: true
    - name: mall-basic-service
      path: outputs/code/repos/mall-basic-service
      layers: [base-data]
      write: true
    - name: mall-inner-api
      path: outputs/code/repos/mall-inner-api
      layers: [api]
      write: true

  database:
    path: outputs/schemas
    tables:
      - aim_agent_script_template
      - aim_download_template
    write: true

  docs:
    - path: outputs/PROGRAMS/P-2026-001-F-005/workspace/outputs
      write: true

  readonly:
    - path: inputs/products/ai-agent-platform-prd.md
    - path: outputs/PROGRAMS/P-2026-003-ai-agent-decomposition/workspace/decomposition.md
